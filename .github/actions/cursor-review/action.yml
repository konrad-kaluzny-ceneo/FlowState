name: Cursor local review
description: Checkout, install, and run pnpm review (local SDK mode) for advisory PR review — no Cursor GitHub integration required

inputs:
  ref:
    description: PR head SHA or ref to checkout
    required: true
  change-id:
    description: Change ID for plan-drift context
    required: false
    default: ""
  base:
    description: Base ref for the diff (use a remote-tracking ref like origin/main on CI runners)
    required: false
    default: origin/main
  pr-title:
    description: PR title for prompt context
    required: false
    default: ""
  pr-description:
    description: PR description for prompt context (caller truncates)
    required: false
    default: ""
  api-key:
    description: CURSOR_API_KEY
    required: true

outputs:
  review-md:
    description: Path to review markdown when generated
    value: ${{ steps.map.outputs.review-md }}
  review-json:
    description: Path to review JSON sidecar
    value: ${{ steps.map.outputs.review-json }}
  skipped:
    description: true when review was soft-skipped (e.g. invalid key)
    value: ${{ steps.map.outputs.skipped }}
  review-outcome:
    description: success or failure of the review run
    value: ${{ steps.map.outputs.review-outcome }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ inputs.ref }}
        persist-credentials: false

    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Run local code review
      id: run
      shell: bash
      continue-on-error: true
      env:
        CURSOR_API_KEY: ${{ inputs.api-key }}
      run: |
        if [ ! -f scripts/cursor-review/review.ts ]; then
          echo "Missing scripts/cursor-review/review.ts — commit the Cursor SDK scripts before enabling this workflow."
          exit 1
        fi
        mkdir -p reports
        REVIEW_ARGS=(
          --base "${{ inputs.base }}"
          --output reports/review.md
          --no-sandbox
        )
        if [ -n "${{ inputs.change-id }}" ]; then
          REVIEW_ARGS+=(--change-id "${{ inputs.change-id }}")
        fi
        if [ -n "${{ inputs.pr-title }}" ]; then
          REVIEW_ARGS+=(--pr-title "${{ inputs.pr-title }}")
        fi
        if [ -n "${{ inputs.pr-description }}" ]; then
          REVIEW_ARGS+=(--pr-description "${{ inputs.pr-description }}")
        fi
        set +e
        pnpm review "${REVIEW_ARGS[@]}"
        EXIT_CODE=$?
        set -e
        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

    - name: Map review outputs
      id: map
      shell: bash
      run: |
        EXIT_CODE="${{ steps.run.outputs.exit_code }}"
        if [ -f reports/review.md ]; then
          echo "review-md=reports/review.md" >> "$GITHUB_OUTPUT"
          if [ -f reports/review.json ]; then
            echo "review-json=reports/review.json" >> "$GITHUB_OUTPUT"
          else
            echo "review-json=" >> "$GITHUB_OUTPUT"
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "review-outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "review-outcome=failure" >> "$GITHUB_OUTPUT"
          fi
        elif [ "$EXIT_CODE" -eq 0 ]; then
          echo "review-md=" >> "$GITHUB_OUTPUT"
          echo "review-json=" >> "$GITHUB_OUTPUT"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          echo "review-outcome=success" >> "$GITHUB_OUTPUT"
        else
          echo "review-md=" >> "$GITHUB_OUTPUT"
          echo "review-json=" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "review-outcome=failure" >> "$GITHUB_OUTPUT"
        fi
