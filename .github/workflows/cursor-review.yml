# Advisory PR code review via Cursor SDK (cloud agent).
# Optional repository secret: CURSOR_API_KEY
# When unset or invalid, the job succeeds with a notice (does not fail CI).
#
# Not a merge gate — runs in parallel with CI quality/e2e.

name: Cursor code review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: cursor-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    name: cursor-review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Cursor review availability
        id: cursor_key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Cursor code review skipped::CURSOR_API_KEY is not configured — advisory review skipped (CI not blocked)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.cursor_key.outputs.skip != 'true'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        if: steps.cursor_key.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.cursor_key.outputs.skip != 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.cursor_key.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run cloud code review
        id: review
        if: steps.cursor_key.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ ! -f scripts/cursor-review/review.ts ]; then
            echo "Missing scripts/cursor-review/review.ts — commit the Cursor SDK scripts before enabling this workflow."
            exit 1
          fi
          mkdir -p reports
          HEAD_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          HEAD_REF="${{ github.head_ref || github.ref_name }}"
          PR_URL="${{ github.event.pull_request.html_url || '' }}"
          REVIEW_ARGS=(
            --ref "$HEAD_SHA"
            --output reports/review.md
          )
          if [ -n "$PR_URL" ]; then
            REVIEW_ARGS+=(--pr-url "$PR_URL")
          fi
          if [[ "$HEAD_REF" == features/* ]]; then
            REVIEW_ARGS+=(--change-id "${HEAD_REF#features/}")
          fi
          pnpm review:cloud "${REVIEW_ARGS[@]}"

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.cursor_key.outputs.skip != 'true' && steps.review.outcome == 'success' && hashFiles('reports/review.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          COMMENT_ID="$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            -q '.[] | select(.body | contains("<!-- cursor-review -->")) | .id' | head -1)"
          if [ -n "$COMMENT_ID" ]; then
            jq -n --rawfile body reports/review.md '{body: $body}' | \
              gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
          else
            gh pr comment "$PR" --body-file reports/review.md
          fi
