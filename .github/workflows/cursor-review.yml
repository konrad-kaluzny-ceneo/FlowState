# Advisory PR code review via Cursor SDK (cloud agent).
# Optional repository secret: CURSOR_API_KEY
# When unset or invalid, the job succeeds with a notice (does not fail CI).
#
# Not a merge gate — runs in parallel with CI quality/e2e.

name: Cursor code review

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: cursor-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    name: cursor-review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      pull-requests: write
    if: >
      (github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name != 'pull_request' ||
       github.event.action != 'labeled' ||
       github.event.label.name == 'ai-cr:review')
    steps:
      - name: Cursor review availability
        id: cursor_key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Cursor code review skipped::CURSOR_API_KEY is not configured — advisory review skipped (CI not blocked)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure review labels
        if: steps.cursor_key.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "ai-cr:passed" --color 2da44e --description "AI code review passed" 2>/dev/null || true
          gh label create "ai-cr:failed" --color cf222e --description "AI code review failed" 2>/dev/null || true
          gh label create "ai-cr:review" --color bfd4f2 --description "Re-run AI code review" 2>/dev/null || true

      - name: Prepare PR labels
        if: steps.cursor_key.outputs.skip != 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          gh pr edit "$PR" --remove-label "ai-cr:review" 2>/dev/null || true
          gh pr edit "$PR" --remove-label "ai-cr:passed" 2>/dev/null || true
          gh pr edit "$PR" --remove-label "ai-cr:failed" 2>/dev/null || true

      - name: Derive change-id
        id: change
        if: steps.cursor_key.outputs.skip != 'true'
        run: |
          HEAD_REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$HEAD_REF" == features/* ]]; then
            echo "id=${HEAD_REF#features/}" >> "$GITHUB_OUTPUT"
          else
            echo "id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Truncate PR description
        id: pr_body
        if: steps.cursor_key.outputs.skip != 'true' && github.event_name == 'pull_request'
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          TRUNC=$(printf '%s' "$BODY" | head -c 2000)
          {
            echo 'description<<EOF'
            printf '%s' "$TRUNC"
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Checkout (load local composite action)
        if: steps.cursor_key.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Run Cursor cloud review
        id: review
        if: steps.cursor_key.outputs.skip != 'true'
        uses: ./.github/actions/cursor-review
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          pr-url: ${{ github.event.pull_request.html_url || '' }}
          change-id: ${{ steps.change.outputs.id }}
          base: main
          pr-title: ${{ github.event.pull_request.title || '' }}
          pr-description: ${{ steps.pr_body.outputs.description || '' }}
          api-key: ${{ secrets.CURSOR_API_KEY }}

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.cursor_key.outputs.skip != 'true' && steps.review.outputs.skipped != 'true' && steps.review.outputs.review-outcome == 'success' && steps.review.outputs.review-md != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          COMMENT_ID="$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            -q '.[] | select(.body | contains("<!-- cursor-review-v1 -->")) | .id' | head -1)"
          if [ -n "$COMMENT_ID" ]; then
            jq -n --rawfile body reports/review.md '{body: $body}' | \
              gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
          else
            gh pr comment "$PR" --body-file reports/review.md
          fi

      - name: Apply review label
        if: github.event_name == 'pull_request' && steps.cursor_key.outputs.skip != 'true' && steps.review.outputs.skipped != 'true' && steps.review.outputs.review-outcome == 'success' && steps.review.outputs.review-json != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          PASSED=$(jq -r '.passed' reports/review.json)
          if [ "$PASSED" = "true" ]; then
            gh pr edit "$PR" --add-label "ai-cr:passed"
          else
            gh pr edit "$PR" --add-label "ai-cr:failed"
          fi

      - name: Handle review failure
        if: always() && github.event_name == 'pull_request' && steps.cursor_key.outputs.skip != 'true' && steps.review.outputs.skipped != 'true' && steps.review.outputs.review-outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          gh pr edit "$PR" --add-label "ai-cr:failed"
          if [ ! -f reports/review.md ]; then
            FAILURE_BODY="$(printf '%s\n\n%s' '<!-- cursor-review-v1 -->' 'Review agent failed to complete.')"
            COMMENT_ID="$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
              -q '.[] | select(.body | contains("<!-- cursor-review-v1 -->")) | .id' | head -1)"
            if [ -n "$COMMENT_ID" ]; then
              jq -n --arg body "$FAILURE_BODY" '{body: $body}' | \
                gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
            else
              printf '%s' "$FAILURE_BODY" | gh pr comment "$PR" --body-file -
            fi
          fi
