# Advisory PR code review via Cursor SDK (cloud agent).
# Optional repository secret: CURSOR_API_KEY
# When unset or invalid, the job succeeds with a notice (does not fail CI).
#
# Not a merge gate — runs in parallel with CI quality/e2e.

name: Cursor code review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: cursor-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    name: cursor-review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Cursor review availability
        id: cursor_key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Cursor code review skipped::CURSOR_API_KEY is not configured — advisory review skipped (CI not blocked)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Derive change-id
        id: change
        if: steps.cursor_key.outputs.skip != 'true'
        run: |
          HEAD_REF="${{ github.head_ref || github.ref_name }}"
          if [[ "$HEAD_REF" == features/* ]]; then
            echo "id=${HEAD_REF#features/}" >> "$GITHUB_OUTPUT"
          else
            echo "id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Truncate PR description
        id: pr_body
        if: steps.cursor_key.outputs.skip != 'true' && github.event_name == 'pull_request'
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          TRUNC=$(printf '%s' "$BODY" | head -c 2000)
          {
            echo 'description<<EOF'
            printf '%s' "$TRUNC"
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Cursor cloud review
        id: review
        if: steps.cursor_key.outputs.skip != 'true'
        uses: ./.github/actions/cursor-review
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          pr-url: ${{ github.event.pull_request.html_url || '' }}
          change-id: ${{ steps.change.outputs.id }}
          base: main
          pr-title: ${{ github.event.pull_request.title || '' }}
          pr-description: ${{ steps.pr_body.outputs.description || '' }}
          api-key: ${{ secrets.CURSOR_API_KEY }}

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.cursor_key.outputs.skip != 'true' && steps.review.outputs.skipped != 'true' && steps.review.outputs.review-outcome == 'success' && steps.review.outputs.review-md != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          COMMENT_ID="$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            -q '.[] | select(.body | contains("<!-- cursor-review-v1 -->")) | .id' | head -1)"
          if [ -n "$COMMENT_ID" ]; then
            jq -n --rawfile body reports/review.md '{body: $body}' | \
              gh api --method PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
          else
            gh pr comment "$PR" --body-file reports/review.md
          fi
